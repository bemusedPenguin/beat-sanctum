spring:
  application:
    name: beat-sanctum
  datasource:
    url: jdbc:postgresql://localhost:5432/beatsanctum
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

aws:
  s3:
    endpoint: http://localhost:9000
    bucket: beatsanctum-tracks
    region: eu-west-2
    access-key: ${MINIO_ROOT_USER}
    secret-key: ${MINIO_ROOT_PASSWORD}

app:
  jwt-secret: ${APP_JWT_SECRET}

