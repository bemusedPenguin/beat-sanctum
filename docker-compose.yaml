services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: beatsanctum
      POSTGRES_USER: devUser
      POSTGRES_PASSWORD: devPassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=eu-west-2
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data: