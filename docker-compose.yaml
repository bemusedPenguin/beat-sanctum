services:
  nginx:
    container_name: beat-sanctum-ui
    build:
      context: ../beat-sanctum-ui
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

  app:
    container_name: beat-sanctum
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/beatsanctum
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_S3_ENDPOINT: http://localstack:4566
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: beatsanctum
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d beatsanctum"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=eu-west-2
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
    restart: unless-stopped

volumes:
  postgres_data:
  localstack_data:
